<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stargate Ship — Not Found</title>
  <meta name="description" content="This sector of space hasn't been charted yet." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 32px;
      text-align: center;
    }
    .icon-ring {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: rgba(124,58,237,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(124,58,237,0.15);
    }
    .icon-ring img {
      width: 64px; height: 64px;
      display: block;
      opacity: 0.8;
    }
    h1 {
      font-size: 72px;
      font-weight: 800;
      color: #7c3aed;
      text-shadow: 0 0 40px rgba(124,58,237,0.3);
      line-height: 1;
    }
    p {
      font-size: 18px;
      color: #a78bfa;
      max-width: 400px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    a:hover {
      opacity: 0.9;
      transform: scale(1.02);
      box-shadow: 0 0 16px rgba(124,58,237,0.4);
    }
    a:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="icon-ring"><img src="/favicon.svg" alt="" width="64" height="64" /></div>
  <h1>404</h1>
  <p>This sector of space hasn't been charted yet. The navigation systems can't find the route you're looking for.</p>
  <a href="/">Return to Ship</a>
</body>
</html>
