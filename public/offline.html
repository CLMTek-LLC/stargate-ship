<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Offline — Stargate Ship</title>
  <meta name="description" content="No network connection. Reconnect to play Stargate Ship." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="canonical" href="https://stargate-ship.coredumped.org/offline.html" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a1a;
      color: #a78bfa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .card {
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 12px;
      padding: 3rem 2rem;
      max-width: 400px;
      background: rgba(124,58,237,0.04);
    }
    .icon-ring {
      width: 72px; height: 72px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      background: rgba(124,58,237,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(124,58,237,0.2);
    }
    .icon-ring img {
      width: 48px; height: 48px;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #7c3aed;
    }
    p {
      color: #888;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #7c3aed;
      text-decoration: none;
      border: 1px solid #7c3aed;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: background 0.2s, box-shadow 0.2s;
    }
    a:hover {
      background: rgba(124,58,237,0.1);
      box-shadow: 0 0 12px rgba(124,58,237,0.3);
    }
    .blink { animation: blink 1.2s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-ring"><img src="/favicon.svg" alt="" width="48" height="48" /></div>
    <h1><span class="blink">_</span> Offline</h1>
    <p>You've lost the connection to Destiny.<br />Reconnect to continue charging the Stargate.</p>
    <a href="/">Try again</a>
  </div>
</body>
</html>
