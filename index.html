  <script type="application/ld+json">

  <title>Stargate Ship — Build, Gather, and Power the Gate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    canvas { display: block; }

    /* HUD Layer */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    #hud > * { pointer-events: auto; }

    /* Resource Bar */
    #resource-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 12px 16px;
      background: linear-gradient(180deg, rgba(10,10,26,0.95) 0%, rgba(10,10,26,0) 100%);
      font-size: 15px;
      font-weight: 600;
      z-index: 20;
    }
    .resource-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    .resource-icon { font-size: 16px; }
    .resource-value { font-variant-numeric: tabular-nums; }

    /* Stargate Progress */
    #stargate-progress {
      position: absolute;
      bottom: 80px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 20;
      min-width: 240px;
    }
    #stargate-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #c084fc;
    }
    #stargate-bar-outer {
      width: 240px;
      height: 14px;
      background: rgba(255,255,255,0.08);
      border-radius: 7px;
      overflow: hidden;
      position: relative;
    }
    #stargate-bar-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa, #c084fc);
      border-radius: 7px;
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 8px rgba(124,58,237,0.3);
      position: relative;
      overflow: hidden;
    }
    /* Shimmer sweep across the bar */
    #stargate-bar-inner::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.2) 50%,
        transparent 100%
      );
      animation: stargate-shimmer 2.5s ease-in-out infinite;
    }
    @keyframes stargate-shimmer {
      0% { left: -100%; }
      100% { left: 200%; }
    }
    /* Milestone diamonds */
    #stargate-milestones {
      display: flex;
      justify-content: space-between;
      padding: 0 1px;
      margin-top: -3px;
    }
    .sg-milestone {
      width: 8px;
      height: 8px;
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 2px;
      transform: rotate(45deg);
      background: transparent;
      transition: all 0.4s ease;
    }
    .sg-milestone.reached {
      background: #c084fc;
      border-color: #c084fc;
      box-shadow: 0 0 6px rgba(192,132,252,0.5);
    }
    #stargate-percent {
      font-size: 12px;
      color: #a78bfa;
      font-variant-numeric: tabular-nums;
    }
    /* Goal breakdown bar set */
    #stargate-goals {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-top: 2px;
    }
    .sg-goal-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }
    .sg-goal-icon { width: 14px; text-align: center; font-size: 11px; }
    .sg-goal-bar-outer {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .sg-goal-bar-inner {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .sg-goal-label {
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .sg-goal-iron  .sg-goal-bar-inner { background: #f87171; }
    .sg-goal-crystal .sg-goal-bar-inner { background: #60a5fa; }
    .sg-goal-energy .sg-goal-bar-inner { background: #fbbf24; }
    .sg-goal-crew  .sg-goal-bar-inner { background: #34d399; }

    /* Bottom Toolbar */
    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: linear-gradient(0deg, rgba(10,10,26,0.95) 0%, rgba(10,10,26,0) 100%);
      z-index: 20;
    }
    .toolbar-btn {
      min-width: 80px;
      min-height: 44px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    .toolbar-btn:active, .toolbar-btn.active {
      background: rgba(124,58,237,0.4);
      border-color: #7c3aed;
    }

    /* Build Panel */
    #build-panel {
      position: absolute;
      top: 60px;
      right: -300px;
      bottom: 70px;
      width: 280px;
      background: rgba(10,10,26,0.95);
      border-left: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px 0 0 12px;
      overflow-y: auto;
      padding: 16px;
      z-index: 25;
      backdrop-filter: blur(12px);
    }
    #build-panel.open { right: 0; }
    #build-panel h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a78bfa;
      margin-bottom: 12px;
    }
    .build-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 56px;
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .build-item:active {
      background: rgba(124,58,237,0.3);
    }
    .build-item.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .build-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .build-item-name {
      font-weight: 600;
      font-size: 14px;
    }
    .build-item-size {
      font-size: 11px;
      color: #888;
    }
    .build-item-stats {
      font-size: 12px;
      color: #aaa;
    }
    .build-item-cost {
      font-size: 12px;
      color: #fbbf24;
    }

    /* Module Info Panel */
    #module-info {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      opacity: 0;
      pointer-events: none;
      background: rgba(10,10,26,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 240px;
      text-align: center;
      z-index: 25;
      backdrop-filter: blur(12px);
    }
    #module-info.visible {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: auto;
    }
    #module-info-close {
      position: absolute;
      top: 8px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      color: #aaa;
      font-size: 16px;
      line-height: 32px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      top: 4px;
      right: 4px;
    }
    #module-info-close:hover {
      background: rgba(255,255,255,0.15);
    }
    #module-info-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      padding-right: 36px;
    }
    #module-info-stats {
      font-size: 13px;
      color: #aaa;
    }
    #module-info-remove {
      margin-top: 10px;
      min-height: 44px;
      padding: 8px 20px;
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 8px;
      color: #f87171;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Win Overlay */
    #win-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10,10,26,0.9);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    #win-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #win-title {
      font-size: 36px;
      font-weight: 800;
      color: #c084fc;
      text-shadow: 0 0 40px rgba(192,132,252,0.6);
      margin-bottom: 16px;
    }
    #win-subtitle {
      font-size: 18px;
      color: #a78bfa;
      margin-bottom: 40px;
    }
    #win-btn {
      min-height: 56px;
      padding: 16px 40px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Floating Resource Text */
    #floating-text-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }
    .floating-text {
      position: absolute;
      font-size: 18px;
      font-weight: 800;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6), 0 0 12px currentColor;
      will-change: transform, opacity;
    }

    /* Notification Toast */
    #toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(30,30,50,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Brownout Indicator */
    #brownout-indicator {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: center;
      gap: 8px;
      z-index: 30;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: opacity 0.5s ease;
    }
    #brownout-indicator.visible {
      display: flex;
    }
    #brownout-indicator.level-1 {
      background: rgba(251,191,36,0.2);
      border: 1px solid rgba(251,191,36,0.4);
      color: #fbbf24;
    }
    #brownout-indicator.level-2 {
      background: rgba(251,146,60,0.25);
      border: 1px solid rgba(251,146,60,0.5);
      color: #fb923c;
      animation: pulse-warning 1.5s ease-in-out infinite;
    }
    #brownout-indicator.level-3 {
      background: rgba(239,68,68,0.3);
      border: 1px solid rgba(239,68,68,0.6);
      color: #f87171;
      animation: pulse-warning 0.8s ease-in-out infinite;
    }

    /* Crew Shortage Indicator */
    #crew-shortage-indicator {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      transition: opacity 0.5s ease;
      margin-top: 42px;
    }
    #crew-shortage-indicator.visible {
      display: flex;
    }
    #crew-shortage-indicator.level-1 {
      background: rgba(251,191,36,0.2);
      border: 1px solid rgba(251,191,36,0.4);
      color: #fbbf24;
    }
    #crew-shortage-indicator.level-2 {
      background: rgba(251,146,60,0.25);
      border: 1px solid rgba(251,146,60,0.5);
      color: #fb923c;
      animation: pulse-warning 1.5s ease-in-out infinite;
    }
    #crew-shortage-indicator.level-3 {
      background: rgba(239,68,68,0.3);
      border: 1px solid rgba(239,68,68,0.6);
      color: #f87171;
      animation: pulse-warning 0.8s ease-in-out infinite;
    }

    /* Pulse animation keyframes */
    @keyframes pulse-warning {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    #brownout-icon { font-size: 16px; }
    #brownout-text { white-space: nowrap; }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="hud">
    <!-- Resource Bar -->
    <div id="resource-bar">
      <div class="resource-item">
        <span class="resource-icon">⚡</span>
        <span class="resource-value" id="res-energy">0</span>
      </div>
      <div class="resource-item">
        <span class="resource-icon">🔩</span>
        <span class="resource-value" id="res-iron">50/500</span>
      </div>
      <div class="resource-item">
        <span class="resource-icon">💎</span>
        <span class="resource-value" id="res-crystal">0/200</span>
      </div>
      <div class="resource-item">
        <span class="resource-icon">👥</span>
        <span class="resource-value" id="res-crew">4/6</span>
      </div>
    </div>

    <!-- Stargate Progress -->
    <div id="stargate-progress">
      <div id="stargate-label">◉ STARGATE</div>
      <div id="stargate-bar-outer">
        <div id="stargate-bar-inner"></div>
      </div>
      <div id="stargate-milestones">
        <div class="sg-milestone" data-pct="25"></div>
        <div class="sg-milestone" data-pct="50"></div>
        <div class="sg-milestone" data-pct="75"></div>
      </div>
      <div id="stargate-percent">0%</div>
      <div id="stargate-goals">
        <div class="sg-goal-row sg-goal-iron">
          <span class="sg-goal-icon">🪨</span>
          <div class="sg-goal-bar-outer">
            <div class="sg-goal-bar-inner" id="sg-goal-iron"></div>
          </div>
          <span class="sg-goal-label" id="sg-goal-iron-label">0/500</span>
        </div>
        <div class="sg-goal-row sg-goal-crystal">
          <span class="sg-goal-icon">💎</span>
          <div class="sg-goal-bar-outer">
            <div class="sg-goal-bar-inner" id="sg-goal-crystal"></div>
          </div>
          <span class="sg-goal-label" id="sg-goal-crystal-label">0/200</span>
        </div>
        <div class="sg-goal-row sg-goal-energy">
          <span class="sg-goal-icon">⚡</span>
          <div class="sg-goal-bar-outer">
            <div class="sg-goal-bar-inner" id="sg-goal-energy"></div>
          </div>
          <span class="sg-goal-label" id="sg-goal-energy-label">0/1000</span>
        </div>
        <div class="sg-goal-row sg-goal-crew">
          <span class="sg-goal-icon">👥</span>
          <div class="sg-goal-bar-outer">
            <div class="sg-goal-bar-inner" id="sg-goal-crew"></div>
          </div>
          <span class="sg-goal-label" id="sg-goal-crew-label">0/10</span>
        </div>
      </div>
    </div>

    <!-- Module Info -->
    <div id="module-info">
      <button id="module-info-close">✕</button>
      <div id="module-info-name">Solar Panel</div>
      <div id="module-info-stats">+5 ⚡/s</div>
      <button id="module-info-remove">Remove Module</button>
    </div>

    <!-- Build Panel -->
    <div id="build-panel">
      <h3>Build Module</h3>
      <div id="build-list"></div>
    </div>

    <!-- Bottom Toolbar -->
    <div id="bottom-bar">
      <button class="toolbar-btn" id="btn-build">BUILD</button>
      <button class="toolbar-btn" id="btn-demolish">DEMOLISH</button>
      <button class="toolbar-btn" id="btn-info">INFO</button>
    </div>
  </div>

  <!-- Floating Resource Text Container -->
  <div id="floating-text-container"></div>

  <!-- Win Overlay -->
  <div id="win-overlay">
    <div id="win-title">STARGATE ACTIVATED</div>
    <div id="win-subtitle">Your ship is ready to travel to a new star system</div>
    <button id="win-btn">Travel to New System</button>
  </div>

    <!-- Toast -->
  <div id="toast"></div>

  <!-- Brownout Indicator -->
  <div id="brownout-indicator">
    <span id="brownout-icon">⚡</span>
    <span id="brownout-text">Power Warning</span>
  </div>

  <!-- Crew Shortage Indicator -->
  <div id="crew-shortage-indicator">
    <span id="crew-shortage-icon">🧑‍🚀</span>
    <span id="crew-shortage-text">Crew Shortage</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
